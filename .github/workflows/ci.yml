name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke)
        run: docker build -t roosterlabs-server .

  # deploy: adicionado quando a conta AWS existir (ver infra/README.md).
  # main verde → build da imagem → push ECR → update Lambda. Sem passo manual.
