name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Presa em v6/v1.64.8 de propósito: golangci-lint-action >= v7 exige
      # golangci-lint v2 (regras mais estritas, config nova) — migração real,
      # fora do orçamento de diff deste bump. Fica em node20 até essa
      # decisão ser tomada à parte (ver nota no épico 002, T6).
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.8

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image (smoke)
        run: docker build -t roosterlabs-server .

  # deploy.yml dispara via workflow_run quando este workflow terminar em main
  # (só com conclusion == 'success') — build da imagem → push ECR → update
  # Lambda, sem passo manual e sem rodar em paralelo com o CI (épico 002).
