name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # golangci-lint v2 (migração deliberada — épico 002, T21). Sem
      # .golangci.yml no repo: roda o conjunto default ("standard") do v2,
      # equivalente ao default do v1 (gosimple foi absorvido pelo
      # staticcheck). Versão pinada; Dependabot mantém a action atualizada.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image (smoke)
        run: docker build -t roosterlabs-server .

  # deploy.yml dispara via workflow_run quando este workflow terminar em main
  # (só com conclusion == 'success') — build da imagem → push ECR → update
  # Lambda, sem passo manual e sem rodar em paralelo com o CI (épico 002).
