name: Deploy

# Dispara só quando o workflow CI terminar em main — nunca em paralelo com
# ele. Antes, deploy.yml tinha seu próprio "push: branches: [main]" e
# rodava build+vet+test próprios (sem lint), então um commit com lint
# quebrado no CI ia ao ar mesmo assim (aprendizado do épico 001, ver
# decisions.md/backlog). workflow_run com checagem de conclusion=='success'
# fecha esse gap sem duplicar build/vet/test/lint aqui.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # Checkout no SHA exato que o CI validou (github.event.workflow_run.head_sha),
      # não no HEAD atual de main — evita deployar um commit que o CI nunca rodou.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: roosterlabs-server
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker tag "$REGISTRY/$REPOSITORY:$IMAGE_TAG" "$REGISTRY/$REPOSITORY:latest"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Update Lambda image
        run: |
          aws lambda update-function-code \
            --function-name roosterlabs-server \
            --image-uri "$IMAGE_URI"

      - name: Wait for deployment completion
        run: |
          aws lambda wait function-updated --function-name roosterlabs-server

      - name: Print deployment summary
        run: |
          echo "Deployed image: $IMAGE_URI"
          aws lambda get-function --function-name roosterlabs-server --query 'Configuration.LastModified' --output text
