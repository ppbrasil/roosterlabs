# Mantém as GitHub Actions atualizadas automaticamente — evita o gap que
# gerou o item de débito técnico do épico 002 (warnings de deprecação do
# Node 20 descobertos manualmente). PRs semanais, revisão humana antes do
# merge (nenhuma automação de merge — decent, not polished).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # v7+ larga suporte a golangci-lint v1 (estamos em v1.64.8 de
      # propósito — migrar pra v2 é decisão à parte, fora do orçamento do
      # épico 002 T6). PR #8 do Dependabot pulou v6->v9 e quebrou o CI
      # (invalid version string 'v1.64.8'). Remover este ignore só quando a
      # migração pra golangci-lint v2 for feita deliberadamente.
      - dependency-name: "golangci/golangci-lint-action"
        versions: [">= 7"]
